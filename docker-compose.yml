services:
  api-investimento:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    image: quarkus/api-investimento-jvm
    ports:
      - "8080:8080"
    volumes:
      - investimento-data:/data
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:sqlite:/data/investimento.db

volumes:
  investimento-data:
