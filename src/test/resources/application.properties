# Use in-memory SQLite for tests
quarkus.datasource.jdbc.url=jdbc:sqlite:file::memory:?cache=shared
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=true
quarkus.flyway.locations=db/migration

# Disable OIDC and all authentication for tests
quarkus.oidc.enabled=false
quarkus.keycloak.devservices.enabled=false

# Override production auth policies - permit all in test profile  
quarkus.http.auth.permission.authenticated.policy=permit
