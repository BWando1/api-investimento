# SQLite datasource configuration
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=jdbc:sqlite:/data/investimento.db

# Hibernate ORM configuration
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# SQL migrations
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# HTTP port
quarkus.http.port=8080

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

# OIDC / Keycloak
quarkus.oidc.application-type=service
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/investimentos}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:api-investimento}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:}
# Roles are read from JWT at realm_access.roles (e.g. usuario, analista)
# Note: this setting only maps roles from token claims; authorization policy is defined below.
quarkus.oidc.roles.role-claim-path=realm_access/roles

# Public routes
quarkus.http.auth.permission.public.paths=/q/health,/q/openapi,/q/swagger-ui/*
quarkus.http.auth.permission.public.policy=permit

# Require authentication for everything else
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Logging
quarkus.log.level=INFO
